<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stress Test Quick Launch</title>
  <style>
    :root {
      --bg: #f5f1e8;
      --card: #fffaf2;
      --line: #d8cfbf;
      --text: #223038;
      --muted: #607078;
      --accent: #0f766e;
      --accent-dark: #115e59;
      --soft: #ecf7f4;
      --error-bg: #fff1ed;
      --error-text: #9a3412;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, #bddfd6 0, transparent 28%),
        radial-gradient(circle at bottom left, #f6d9a8 0, transparent 24%),
        linear-gradient(180deg, var(--bg), #ebe4d7);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(560px, 100%);
      background: rgba(255, 250, 242, 0.96);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 24px;
      box-shadow: 0 18px 46px rgba(34, 48, 56, 0.10);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 14px;
    }

    @media (max-width: 640px) {
      .grid { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      font: inherit;
      background: white;
      color: var(--text);
    }

    textarea {
      resize: vertical;
      min-height: 92px;
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    .primary {
      background: var(--accent);
      color: white;
    }

    .primary:hover {
      background: var(--accent-dark);
    }

    .secondary {
      background: var(--soft);
      color: var(--accent-dark);
    }

    .status {
      margin-top: 16px;
      border-radius: 12px;
      padding: 12px 14px;
      display: none;
    }

    .status.info {
      display: block;
      background: var(--soft);
      color: var(--accent-dark);
    }

    .status.error {
      display: block;
      background: var(--error-bg);
      color: var(--error-text);
    }

    .hint {
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Quick Launch Stress Test</h1>
    <p>Version minimaliste pour lancer un test rapidement. Les autres parametres restent ceux deja presents dans <code>PBIReport.json</code>.</p>

    <div class="grid">
      <div>
        <label for="testId">Test ID</label>
        <input id="testId" type="text">
      </div>
      <div>
        <label for="instances">Instances</label>
        <input id="instances" type="number" min="1" value="2">
      </div>
      <div>
        <label for="thinkTimeSeconds">Think time (s)</label>
        <input id="thinkTimeSeconds" type="number" min="0" value="5">
      </div>
      <div>
        <label for="metricsRefreshSeconds">Refresh metrics (s)</label>
        <input id="metricsRefreshSeconds" type="number" min="1" value="5">
      </div>
    </div>

    <label for="reportUrl">Report URL</label>
    <textarea id="reportUrl"></textarea>

    <div class="actions">
      <button class="secondary" id="reloadDefaults" type="button">Recharger</button>
      <button class="primary" id="launchTest" type="button">Lancer le test</button>
    </div>

    <div class="hint">Cette vue garde les filtres, la page et la configuration du layout deja definis dans votre fichier courant.</div>
    <div id="status" class="status"></div>
  </main>

  <script>
    const statusBox = document.getElementById("status");
    let defaults = null;

    function setStatus(message, type = "info") {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function clearStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function fillForm(config) {
      defaults = config;
      document.getElementById("testId").value = config.testId || "";
      document.getElementById("instances").value = config.instances || 2;
      document.getElementById("thinkTimeSeconds").value = config.thinkTimeSeconds || 5;
      document.getElementById("metricsRefreshSeconds").value = config.metricsRefreshSeconds || 5;
      document.getElementById("reportUrl").value = config.reportUrl || "";
    }

    async function loadDefaults() {
      clearStatus();
      const response = await fetch("/api/defaults");
      const config = await response.json();
      fillForm(config);
    }

    async function launchTest() {
      clearStatus();
      if (!defaults) {
        setStatus("La configuration par defaut n'est pas encore chargee.", "error");
        return;
      }

      const payload = {
        ...defaults,
        testId: document.getElementById("testId").value.trim(),
        instances: Number(document.getElementById("instances").value),
        thinkTimeSeconds: Number(document.getElementById("thinkTimeSeconds").value),
        metricsRefreshSeconds: Number(document.getElementById("metricsRefreshSeconds").value),
        reportUrl: document.getElementById("reportUrl").value.trim()
      };

      if (!payload.testId) {
        setStatus("Le Test ID est obligatoire.", "error");
        return;
      }

      if (!payload.reportUrl) {
        setStatus("Le Report URL est obligatoire.", "error");
        return;
      }

      try {
        const response = await fetch("/api/launch", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "Impossible de lancer le test.");
        }

        setStatus(result.message, "info");
      } catch (error) {
        setStatus(error.message, "error");
      }
    }

    document.getElementById("reloadDefaults").addEventListener("click", () => loadDefaults().catch((error) => setStatus(error.message, "error")));
    document.getElementById("launchTest").addEventListener("click", () => launchTest());

    loadDefaults().catch((error) => setStatus(error.message, "error"));
  </script>
</body>
</html>
